<svg xmlns="http://www.w3.org/2000/svg" width="1536" height="864" viewBox="0 0 1536 864" role="img" aria-labelledby="title desc">
  <title id="title">MCP call loop</title>
  <desc id="desc">Host connects to an MCP server, imports tools, receives a model tool call, asks for approval if needed, calls the tool, and returns a structured result.</desc>
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M2 2 L10 6 L2 10 Z" fill="#1b4565"/>
    </marker>
    <style>
      text{font-family:-apple-system,BlinkMacSystemFont,'Noto Sans JP','Hiragino Sans',sans-serif;fill:#172033} .small{font-size:24px}.label{font-size:29px;font-weight:700}.num{font-size:24px;font-weight:800;fill:#fff}.muted{fill:#546277}.box{fill:#fff;stroke:#cbd5e1;stroke-width:2}.host{fill:#eaf5f4;stroke:#2f9c95}.server{fill:#fff4df;stroke:#c98220}.model{fill:#eef4fb;stroke:#1b4565}.approval{fill:#f6f8fb;stroke:#94a3b8;stroke-dasharray:8 8}
    </style>
  </defs>
  <rect width="1536" height="864" fill="#f6f8fb"/>
  <text x="88" y="84" font-size="40" font-weight="800">MCPの1回の呼び出し</text>
  <text x="88" y="124" class="small muted">LLMは外部APIを直接叩かず、Hostが接続・承認・実行を仲介する</text>

  <rect class="box host" x="80" y="210" width="300" height="155" rx="14"/>
  <circle cx="122" cy="250" r="22" fill="#2f9c95"/><text class="num" x="115" y="259">1</text>
  <text class="label" x="158" y="254">Hostが接続</text>
  <text class="small muted" x="112" y="304">initialize / transport</text>
  <text class="small muted" x="112" y="336">stdio または HTTP</text>

  <rect class="box server" x="458" y="210" width="300" height="155" rx="14"/>
  <circle cx="500" cy="250" r="22" fill="#c98220"/><text class="num" x="493" y="259">2</text>
  <text class="label" x="536" y="254">tools/list</text>
  <text class="small muted" x="490" y="304">tool名 / description</text>
  <text class="small muted" x="490" y="336">inputSchemaを取得</text>

  <rect class="box model" x="836" y="210" width="300" height="155" rx="14"/>
  <circle cx="878" cy="250" r="22" fill="#1b4565"/><text class="num" x="871" y="259">3</text>
  <text class="label" x="914" y="254">LLMが選ぶ</text>
  <text class="small muted" x="868" y="304">user依頼 + tool定義</text>
  <text class="small muted" x="868" y="336">name + arguments</text>

  <rect class="box approval" x="1214" y="210" width="240" height="155" rx="14"/>
  <circle cx="1256" cy="250" r="22" fill="#64748b"/><text class="num" x="1249" y="259">4</text>
  <text class="label" x="1292" y="254">承認</text>
  <text class="small muted" x="1246" y="304">write / destructive</text>
  <text class="small muted" x="1246" y="336">必要時に確認</text>

  <rect class="box host" x="270" y="520" width="340" height="160" rx="14"/>
  <circle cx="312" cy="560" r="22" fill="#2f9c95"/><text class="num" x="305" y="569">5</text>
  <text class="label" x="348" y="564">tools/callへ変換</text>
  <text class="small muted" x="302" y="614">HostがMCP JSON-RPCを送る</text>
  <text class="small muted" x="302" y="646">serverへ実行依頼</text>

  <rect class="box server" x="735" y="520" width="340" height="160" rx="14"/>
  <circle cx="777" cy="560" r="22" fill="#c98220"/><text class="num" x="770" y="569">6</text>
  <text class="label" x="813" y="564">backendを実行</text>
  <text class="small muted" x="767" y="614">GitHub / DB / SaaS / 社内API</text>
  <text class="small muted" x="767" y="646">structured resultを返す</text>

  <path d="M386 288 H444" stroke="#1b4565" stroke-width="4" marker-end="url(#arrow)" fill="none"/>
  <path d="M764 288 H822" stroke="#1b4565" stroke-width="4" marker-end="url(#arrow)" fill="none"/>
  <path d="M1142 288 H1200" stroke="#1b4565" stroke-width="4" marker-end="url(#arrow)" fill="none"/>
  <path d="M1334 374 C1334 455 440 430 440 506" stroke="#1b4565" stroke-width="4" marker-end="url(#arrow)" fill="none"/>
  <path d="M616 600 H720" stroke="#1b4565" stroke-width="4" marker-end="url(#arrow)" fill="none"/>
  <path d="M1078 600 C1220 600 1220 430 1010 386" stroke="#1b4565" stroke-width="4" marker-end="url(#arrow)" fill="none"/>
  <text x="1112" y="612" class="small muted">結果はmodel contextへ戻る</text>
</svg>
