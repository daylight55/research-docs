<svg xmlns="http://www.w3.org/2000/svg" width="1536" height="864" viewBox="0 0 1536 864" role="img" aria-labelledby="title desc">
  <title id="title">Tool call text generation</title>
  <desc id="desc">Tool definitions become model context; the model generates structured tool call fields; the host parses and executes them.</desc>
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto"><path d="M2 2 L10 6 L2 10 Z" fill="#1b4565"/></marker>
    <style>
      text{font-family:-apple-system,BlinkMacSystemFont,'Noto Sans JP','Hiragino Sans',sans-serif;fill:#172033}.title{font-size:38px;font-weight:800}.sub{font-size:23px;fill:#546277}.h{font-size:25px;font-weight:800}.p{font-size:22px;fill:#42526a}.mono{font-family:'SFMono-Regular','Menlo',monospace;font-size:22px;fill:#172033}.box{fill:#fff;stroke:#d5dde8;stroke-width:2}.input{fill:#eef4fb;stroke:#1b4565}.model{fill:#eaf5f4;stroke:#2f9c95}.host{fill:#fff4df;stroke:#c98220}.note{fill:#f6f8fb;stroke:#cbd5e1;stroke-width:2}.white{fill:#fff}
    </style>
  </defs>
  <rect width="1536" height="864" fill="#f6f8fb"/>
  <text class="title" x="88" y="84">tool callの「テキスト」はどこで生まれるか</text>
  <text class="sub" x="88" y="123">自然文ではなく、modelが生成する構造化出力をhostが解釈して実行する</text>

  <rect class="box input" x="86" y="205" width="360" height="420" rx="16"/>
  <text class="h" x="120" y="255">1. tool定義がcontextへ入る</text>
  <text class="p" x="120" y="310">MCP tools/list</text>
  <text class="p" x="120" y="346">provider tools/function schema</text>
  <rect class="note" x="120" y="386" width="292" height="160" rx="10"/>
  <text class="mono" x="144" y="426">name: search_items</text>
  <text class="mono" x="144" y="466">description: ...</text>
  <text class="mono" x="144" y="506">inputSchema: {...}</text>
  <text class="p" x="120" y="586">Claude API: special system prompt</text>

  <rect class="box model" x="590" y="205" width="360" height="420" rx="16"/>
  <text class="h" x="624" y="255">2. LLMがtokenとして生成</text>
  <text class="p" x="624" y="310">user依頼 + system prompt</text>
  <text class="p" x="624" y="346">+ tool definitionsから判断</text>
  <rect class="note" x="624" y="386" width="292" height="160" rx="10"/>
  <text class="mono" x="648" y="426">tool_call {</text>
  <text class="mono" x="672" y="466">name</text>
  <text class="mono" x="672" y="506">arguments</text>
  <text class="mono" x="648" y="546">}</text>
  <text class="p" x="624" y="586">streamではpartial JSONにも見える</text>

  <rect class="box host" x="1094" y="205" width="360" height="420" rx="16"/>
  <text class="h" x="1128" y="255">3. Hostがparseして実行</text>
  <text class="p" x="1128" y="310">validation / approval / retry</text>
  <text class="p" x="1128" y="346">MCP tools/callへ変換</text>
  <rect class="note" x="1128" y="386" width="292" height="160" rx="10"/>
  <text class="mono" x="1152" y="426">method: tools/call</text>
  <text class="mono" x="1152" y="466">params.name</text>
  <text class="mono" x="1152" y="506">params.arguments</text>
  <text class="p" x="1128" y="586">resultをmodel contextへ戻す</text>

  <path d="M462 414 H574" stroke="#1b4565" stroke-width="4" marker-end="url(#arrow)" fill="none"/>
  <path d="M966 414 H1078" stroke="#1b4565" stroke-width="4" marker-end="url(#arrow)" fill="none"/>
  <rect x="326" y="690" width="884" height="70" rx="35" fill="#172033"/>
  <text class="white" x="416" y="735" font-size="23" font-weight="800">Claude Code / Codex: HostがMCP serverと承認境界を管理</text>
</svg>
