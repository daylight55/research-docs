<svg xmlns="http://www.w3.org/2000/svg" width="1536" height="700" viewBox="0 100 1536 700" role="img" aria-labelledby="title desc">
<title id="title">WebMCP surface map</title><desc id="desc">WebMCP exposes live web page capabilities to a browser agent, while MCP exposes backend services.</desc>
<defs><marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto"><path d="M2 2 L10 6 L2 10 Z" fill="#1b4565"/></marker><style>text{font-family:-apple-system,BlinkMacSystemFont,'Noto Sans JP','Hiragino Sans',sans-serif;fill:#172033}.title{font-size:39px;font-weight:800}.sub{font-size:23px;fill:#546277}.h{font-size:27px;font-weight:800}.p{font-size:22px;fill:#42526a}.small{font-size:19px;fill:#546277}.mono{font-family:'SFMono-Regular','Menlo',monospace;font-size:20px;fill:#172033}.card{fill:#fff;stroke:#d5dde8;stroke-width:2}.blue{fill:#eef4fb;stroke:#1b4565}.teal{fill:#eaf5f4;stroke:#2f9c95}.amber{fill:#fff4df;stroke:#c98220}.gray{fill:#f6f8fb;stroke:#cbd5e1}.dark{fill:#172033}.white{fill:#fff}.label{font-size:18px;font-weight:800}.num{font-size:20px;font-weight:800;fill:#fff}</style></defs>

<rect class="card blue" x="88" y="216" width="360" height="360" rx="18"/><text class="h" x="126" y="270">Backend MCP</text><text class="p" x="126" y="324">永続server</text><text class="p" x="126" y="362">service API / DB / SaaS</text><text class="p" x="126" y="400">どのhostからも使う</text><rect class="gray" x="126" y="448" width="284" height="62" rx="10"/><text class="mono" x="152" y="488">tools/list -> tools/call</text>
<rect class="card teal" x="588" y="216" width="360" height="360" rx="18"/><text class="h" x="626" y="270">WebMCP</text><text class="p" x="626" y="324">live tabのWeb app</text><text class="p" x="626" y="362">DOM / session / cookie</text><text class="p" x="626" y="400">pageにいる時だけ見える</text><rect class="gray" x="626" y="448" width="284" height="62" rx="10"/><text class="mono" x="650" y="488">registerTool() / form</text>
<rect class="card amber" x="1088" y="216" width="360" height="360" rx="18"/><text class="h" x="1126" y="270">Browser MCP</text><text class="p" x="1126" y="324">Playwright / DevTools</text><text class="p" x="1126" y="362">screenshot / console</text><text class="p" x="1126" y="400">検証とdebugに使う</text><rect class="gray" x="1126" y="448" width="284" height="62" rx="10"/><text class="mono" x="1150" y="488">browser action tools</text>
<path d="M455 396 H574" stroke="#1b4565" stroke-width="4" marker-end="url(#arrow)"/><path d="M955 396 H1074" stroke="#1b4565" stroke-width="4" marker-end="url(#arrow)"/>
</svg>
