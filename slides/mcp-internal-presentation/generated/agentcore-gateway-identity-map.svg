<svg xmlns="http://www.w3.org/2000/svg" width="1536" height="700" viewBox="0 100 1536 700" role="img" aria-labelledby="title desc">
<title id="title">AgentCore Gateway and Identity map</title><desc id="desc">AgentCore Gateway provides MCP endpoint and routing; AgentCore Identity manages tokens and delegated authorization.</desc>
<defs><marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto"><path d="M2 2 L10 6 L2 10 Z" fill="#1b4565"/></marker><style>text{font-family:-apple-system,BlinkMacSystemFont,'Noto Sans JP','Hiragino Sans',sans-serif;fill:#172033}.title{font-size:39px;font-weight:800}.sub{font-size:23px;fill:#546277}.h{font-size:27px;font-weight:800}.p{font-size:22px;fill:#42526a}.small{font-size:19px;fill:#546277}.mono{font-family:'SFMono-Regular','Menlo',monospace;font-size:20px;fill:#172033}.card{fill:#fff;stroke:#d5dde8;stroke-width:2}.blue{fill:#eef4fb;stroke:#1b4565}.teal{fill:#eaf5f4;stroke:#2f9c95}.amber{fill:#fff4df;stroke:#c98220}.gray{fill:#f6f8fb;stroke:#cbd5e1}.dark{fill:#172033}.white{fill:#fff}.label{font-size:18px;font-weight:800}.num{font-size:20px;font-weight:800;fill:#fff}</style></defs>

<rect class="card blue" x="90" y="262" width="285" height="190" rx="16"/><text class="h" x="128" y="316">Claude / Codex</text><text class="p" x="128" y="365">MCP client</text><text class="p" x="128" y="401">user request</text>
<rect class="card teal" x="520" y="214" width="420" height="286" rx="18"/><text class="h" x="560" y="270">AgentCore Gateway</text><text class="p" x="560" y="322">MCP endpoint</text><text class="p" x="560" y="360">tool aggregation</text><text class="p" x="560" y="398">target routing</text><rect class="gray" x="560" y="430" width="338" height="42" rx="10"/><text class="mono" x="586" y="458">tools/list + tools/call</text>
<rect class="card amber" x="1112" y="176" width="300" height="126" rx="14"/><text class="h" x="1146" y="226">OpenAPI API</text><text class="p" x="1146" y="264">REST / SaaS / internal</text>
<rect class="card amber" x="1112" y="370" width="300" height="126" rx="14"/><text class="h" x="1146" y="420">Lambda / Smithy</text><text class="p" x="1146" y="458">custom business logic</text>
<rect class="card amber" x="1112" y="564" width="300" height="126" rx="14"/><text class="h" x="1146" y="614">Existing MCP</text><text class="p" x="1146" y="652">server target</text>
<rect class="card blue" x="510" y="586" width="440" height="154" rx="18"/><text class="h" x="552" y="638">AgentCore Identity</text><text class="p" x="552" y="684">OAuth provider / token vault / OBO exchange</text><text class="small" x="552" y="718">inbound user tokenをdownstream向けtokenへ交換</text>
