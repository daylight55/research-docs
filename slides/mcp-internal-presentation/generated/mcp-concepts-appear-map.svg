<svg xmlns="http://www.w3.org/2000/svg" width="1536" height="864" viewBox="0 0 1536 864" role="img" aria-labelledby="title desc">
  <title id="title">MCP concepts appear map</title>
  <desc id="desc">Overview showing where Tool Resource Prompt Protocol and Transport appear in an MCP connection between host client and server.</desc>
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M2 2 L10 6 L2 10 Z" fill="#1b4565"/>
    </marker>
    <marker id="arrow-teal" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M2 2 L10 6 L2 10 Z" fill="#2f9c95"/>
    </marker>
    <style>
      text{font-family:-apple-system,BlinkMacSystemFont,'Noto Sans JP','Hiragino Sans',sans-serif;fill:#172033}
      .title{font-size:40px;font-weight:850}
      .subtitle{font-size:23px;fill:#546277}
      .label{font-size:29px;font-weight:800}
      .small{font-size:22px;fill:#546277}
      .tiny{font-size:19px;fill:#546277}
      .mono{font-family:'SFMono-Regular','Menlo','Consolas',monospace;font-size:21px;fill:#172033}
      .zone{fill:#ffffff;stroke:#cbd5e1;stroke-width:2}
      .host{fill:#eaf5f4;stroke:#2f9c95}
      .server{fill:#fff4df;stroke:#c98220}
      .client{fill:#eef4fb;stroke:#1b4565}
      .catalog{fill:#ffffff;stroke:#d9e2ec}
      .lane{fill:#eef3f8;stroke:#1b4565;stroke-width:2}
      .badge{font-size:18px;font-weight:850;fill:#ffffff}
      .callout{font-size:23px;font-weight:800;fill:#1b4565}
      .tealText{fill:#2f9c95}
      .amberText{fill:#c98220}
    </style>
  </defs>
  <rect width="1536" height="864" fill="#f6f8fb"/>
  <text x="88" y="84" class="title">これから出る用語が登場する場所</text>
  <text x="88" y="124" class="subtitle">Tool / Resource / Promptはserverが公開するもの。Protocol / Transportはclientとserverの会話を成立させるもの。</text>

  <rect class="zone host" x="92" y="190" width="360" height="420" rx="18"/>
  <text x="132" y="242" class="label">Host</text>
  <text x="132" y="276" class="small">Claude / Codex / VS Code</text>

  <rect class="zone client" x="132" y="332" width="280" height="180" rx="14"/>
  <text x="164" y="382" class="label">MCP Client</text>
  <text x="164" y="424" class="small">serverごとにsessionを持つ</text>
  <text x="164" y="462" class="mono">initialize</text>
  <text x="164" y="492" class="mono">tools/list</text>

  <rect class="zone server" x="1084" y="190" width="360" height="420" rx="18"/>
  <text x="1124" y="242" class="label">MCP Server</text>
  <text x="1124" y="276" class="small">外部systemをagent向けに公開</text>

  <rect class="zone catalog" x="1124" y="322" width="280" height="220" rx="14"/>
  <text x="1156" y="366" class="label">公開するピース</text>

  <rect x="1158" y="394" width="214" height="38" rx="19" fill="#eaf5f4" stroke="#2f9c95"/>
  <text x="1178" y="420" class="small">Tool: 実行するaction</text>
  <rect x="1158" y="444" width="214" height="38" rx="19" fill="#eef4fb" stroke="#1b4565"/>
  <text x="1178" y="470" class="small">Resource: 読むcontext</text>
  <rect x="1158" y="494" width="214" height="38" rx="19" fill="#fff4df" stroke="#c98220"/>
  <text x="1178" y="520" class="small">Prompt: 手順template</text>

  <rect class="zone" x="1124" y="574" width="280" height="76" rx="14"/>
  <text x="1156" y="606" class="small">Backend API / DB / SaaS</text>
  <text x="1156" y="636" class="tiny">serverの裏側にある実体</text>

  <rect class="lane" x="514" y="286" width="508" height="238" rx="18"/>
  <text x="556" y="338" class="label">Client と Server の会話</text>
  <text x="556" y="380" class="callout">Protocol</text>
  <text x="690" y="380" class="small">messageの形と順序</text>
  <text x="556" y="423" class="mono">initialize -> tools/list -> tools/call</text>
  <text x="556" y="468" class="callout tealText">Transport</text>
  <text x="690" y="468" class="small">messageの運び方</text>
  <text x="556" y="510" class="mono">stdio / Streamable HTTP</text>

  <path d="M420 420 H500" stroke="#1b4565" stroke-width="5" marker-end="url(#arrow)" fill="none"/>
  <path d="M1028 420 H1108" stroke="#1b4565" stroke-width="5" marker-end="url(#arrow)" fill="none"/>
  <text x="456" y="392" class="tiny">JSON-RPC message</text>
  <text x="1038" y="392" class="tiny">同じmessage</text>

  <path d="M1264 548 V568" stroke="#c98220" stroke-width="4" marker-end="url(#arrow)" fill="none"/>

  <rect x="110" y="674" width="405" height="84" rx="14" fill="#ffffff" stroke="#d9e2ec"/>
  <circle cx="148" cy="716" r="18" fill="#2f9c95"/>
  <text x="142" y="723" class="badge">1</text>
  <text x="182" y="708" class="small">まずserverが何を公開するかを見る</text>
  <text x="182" y="738" class="tiny">次のスライド: Tool / Resource / Prompt</text>

  <rect x="570" y="674" width="405" height="84" rx="14" fill="#ffffff" stroke="#d9e2ec"/>
  <circle cx="608" cy="716" r="18" fill="#1b4565"/>
  <text x="602" y="723" class="badge">2</text>
  <text x="642" y="708" class="small">次にmessageをどう運ぶかを見る</text>
  <text x="642" y="738" class="tiny">次々のスライド: Protocol / Transport</text>

  <rect x="1030" y="674" width="405" height="84" rx="14" fill="#ffffff" stroke="#d9e2ec"/>
  <circle cx="1068" cy="716" r="18" fill="#c98220"/>
  <text x="1062" y="723" class="badge">3</text>
  <text x="1102" y="708" class="small">最後に1回の呼び出しへつなげる</text>
  <text x="1102" y="738" class="tiny">後のスライド: tools/call と承認</text>
</svg>
