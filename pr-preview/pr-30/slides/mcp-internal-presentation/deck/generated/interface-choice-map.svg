<svg xmlns="http://www.w3.org/2000/svg" width="1536" height="700" viewBox="0 100 1536 700" role="img" aria-labelledby="title desc">
  <title id="title">CLI Browser MCP comparison</title>
  <desc id="desc">A comparison map of CLI, Browser, and MCP as interfaces an agent can use.</desc>
  <defs>
    <style>
      text{font-family:-apple-system,BlinkMacSystemFont,'Noto Sans JP','Hiragino Sans',sans-serif;fill:#172033}.title{font-size:40px;font-weight:800}.sub{font-size:24px;fill:#546277}.h{font-size:30px;font-weight:800}.p{font-size:23px;fill:#42526a}.tag{font-size:20px;font-weight:800;letter-spacing:.02em}.card{fill:#fff;stroke:#d5dde8;stroke-width:2}.cli{stroke:#1b4565}.browser{stroke:#2f9c95}.mcp{stroke:#c98220}.axis{stroke:#94a3b8;stroke-width:3}.pill{fill:#f6f8fb;stroke:#cbd5e1}
    </style>
  </defs>
  
  

  <line class="axis" x1="170" y1="710" x2="1366" y2="710"/>
  
  

  <rect class="card cli" x="96" y="210" width="395" height="410" rx="16"/>
  <rect class="pill" x="126" y="240" width="86" height="34" rx="17"/><text class="tag" x="152" y="264">CLI</text>
  <text class="h" x="126" y="324">command + stdout</text>
  <text class="p" x="126" y="374">強い場面</text>
  <text class="p" x="154" y="414">local test / build / git</text>
  <text class="p" x="154" y="450">devops automation</text>
  <text class="p" x="126" y="510">弱い場面</text>
  <text class="p" x="154" y="550">flags / env / 巨大ログを</text>
  <text class="p" x="154" y="586">毎回推測しやすい</text>

  <rect class="card browser" x="570" y="210" width="395" height="410" rx="16"/>
  <rect class="pill" x="600" y="240" width="128" height="34" rx="17"/><text class="tag" x="626" y="264">Browser</text>
  <text class="h" x="600" y="324">UI + DOM + screenshot</text>
  <text class="p" x="600" y="374">強い場面</text>
  <text class="p" x="628" y="414">visual QA / session依存</text>
  <text class="p" x="628" y="450">実画面の確認</text>
  <text class="p" x="600" y="510">弱い場面</text>
  <text class="p" x="628" y="550">layout / selector / loadingに</text>
  <text class="p" x="628" y="586">挙動が左右される</text>

  <rect class="card mcp" x="1044" y="210" width="395" height="410" rx="16"/>
  <rect class="pill" x="1074" y="240" width="92" height="34" rx="17"/><text class="tag" x="1100" y="264">MCP</text>
  <text class="h" x="1074" y="324">schema + result</text>
  <text class="p" x="1074" y="374">強い場面</text>
  <text class="p" x="1102" y="414">repeatableなAPI / data</text>
  <text class="p" x="1102" y="450">tool approval / auth</text>
  <text class="p" x="1074" y="510">弱い場面</text>
  <text class="p" x="1102" y="550">server設計と運用が</text>
  <text class="p" x="1102" y="586">必要になる</text>

  <circle cx="210" cy="710" r="10" fill="#1b4565"/>
  <circle cx="768" cy="710" r="10" fill="#2f9c95"/>
  <circle cx="1326" cy="710" r="10" fill="#c98220"/>
</svg>
