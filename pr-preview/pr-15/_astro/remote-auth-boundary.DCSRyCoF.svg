<svg xmlns="http://www.w3.org/2000/svg" width="1536" height="864" viewBox="0 0 1536 864" role="img" aria-labelledby="title desc">
<title id="title">Remote MCP auth boundary</title><desc id="desc">Remote MCP authorization explained by authority, scope, and audience.</desc>
<defs><marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto"><path d="M2 2 L10 6 L2 10 Z" fill="#1b4565"/></marker><style>text{font-family:-apple-system,BlinkMacSystemFont,'Noto Sans JP','Hiragino Sans',sans-serif;fill:#172033}.title{font-size:39px;font-weight:800}.sub{font-size:23px;fill:#546277}.h{font-size:27px;font-weight:800}.p{font-size:22px;fill:#42526a}.small{font-size:19px;fill:#546277}.mono{font-family:'SFMono-Regular','Menlo',monospace;font-size:20px;fill:#172033}.card{fill:#fff;stroke:#d5dde8;stroke-width:2}.blue{fill:#eef4fb;stroke:#1b4565}.teal{fill:#eaf5f4;stroke:#2f9c95}.amber{fill:#fff4df;stroke:#c98220}.gray{fill:#f6f8fb;stroke:#cbd5e1}.dark{fill:#172033}.white{fill:#fff}.label{font-size:18px;font-weight:800}.num{font-size:20px;font-weight:800;fill:#fff}</style></defs><rect width="1536" height="864" fill="#f6f8fb"/>
<text class="title" x="88" y="82">Remote authで覚える3点</text><text class="sub" x="88" y="122">難所はJSON-RPCではなく、権限の持ち主・範囲・宛先を壊さないこと</text>
<rect class="card blue" x="84" y="210" width="390" height="360" rx="16"/><text class="h" x="122" y="262">1. 誰の権限か</text><text class="p" x="122" y="314">user / agent / service account</text><text class="p" x="122" y="354">を分けて扱う</text><rect class="gray" x="122" y="408" width="308" height="92" rx="10"/><text class="mono" x="146" y="446">user: tanimura</text><text class="mono" x="146" y="480">agent: codex</text><text class="small" x="122" y="532">失敗: agentが過剰権限で動く</text>
<rect class="card teal" x="573" y="210" width="390" height="360" rx="16"/><text class="h" x="611" y="262">2. どのscopeか</text><text class="p" x="611" y="314">read / write / project / env</text><text class="p" x="611" y="354">操作範囲を絞る</text><rect class="gray" x="611" y="408" width="308" height="92" rx="10"/><text class="mono" x="635" y="446">scope: issues:read</text><text class="mono" x="635" y="480">scope: deploy:write</text><text class="small" x="611" y="532">失敗: 予期しないwriteや漏えい</text>
<rect class="card amber" x="1062" y="210" width="390" height="360" rx="16"/><text class="h" x="1100" y="262">3. tokenの宛先</text><text class="p" x="1100" y="314">MCP server / backend API</text><text class="p" x="1100" y="354">どこ向けtokenか検証する</text><rect class="gray" x="1100" y="408" width="308" height="92" rx="10"/><text class="mono" x="1124" y="446">aud: mcp.example.com</text><text class="mono" x="1124" y="480">aud: api.example.com</text><text class="small" x="1100" y="532">失敗: 別serverへのtoken再利用</text>
<path d="M476 386 H556" stroke="#1b4565" stroke-width="4" marker-end="url(#arrow)"/><path d="M965 386 H1046" stroke="#1b4565" stroke-width="4" marker-end="url(#arrow)"/>
<rect class="dark" x="256" y="650" width="1024" height="74" rx="37"/><text class="white" x="362" y="696" font-size="25" font-weight="800">Protected Resource Metadata / OIDC Discovery / PKCE はこの3点を支える</text>
</svg>
