<svg xmlns="http://www.w3.org/2000/svg" width="1536" height="864" viewBox="0 0 1536 864" role="img" aria-labelledby="title desc">
  <title id="title">Host / Client / Serverの責務境界</title>
  <desc id="desc">User、Host、MCP Client、MCP Server、Backendを境界別に並べ、serverはbackendそのものではなくagent向けadapterであることを示す図。</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="10" markerHeight="10" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#1b4565"/>
    </marker>
    <filter id="shadow" x="-8%" y="-12%" width="116%" height="124%">
      <feDropShadow dx="0" dy="9" stdDeviation="10" flood-color="#172033" flood-opacity="0.10"/>
    </filter>
  </defs>
  <rect width="1536" height="864" fill="#f6f8fb"/>
  <rect x="58" y="52" width="1420" height="760" rx="28" fill="#ffffff" stroke="#d8e0e8" stroke-width="2"/>
  <text x="92" y="124" fill="#172033" font-family="-apple-system,BlinkMacSystemFont,'Hiragino Sans','Noto Sans JP',sans-serif" font-size="44" font-weight="800">Host / Client / Serverの責務境界</text>
  <text x="92" y="166" fill="#59677a" font-family="-apple-system,BlinkMacSystemFont,'Hiragino Sans','Noto Sans JP',sans-serif" font-size="24">MCPは「誰が接続し、誰が承認し、どこが実行するか」を分けて見る</text>

  <rect x="96" y="238" width="230" height="298" rx="22" fill="#eef5f9" stroke="#b6c7d7" stroke-width="2" filter="url(#shadow)"/>
  <text x="211" y="300" text-anchor="middle" fill="#1b4565" font-family="-apple-system,BlinkMacSystemFont,'Hiragino Sans','Noto Sans JP',sans-serif" font-size="32" font-weight="800">User</text>
  <text x="211" y="360" text-anchor="middle" fill="#172033" font-family="-apple-system,BlinkMacSystemFont,'Hiragino Sans','Noto Sans JP',sans-serif" font-size="24" font-weight="700">依頼する</text>
  <text x="211" y="402" text-anchor="middle" fill="#59677a" font-family="-apple-system,BlinkMacSystemFont,'Hiragino Sans','Noto Sans JP',sans-serif" font-size="21">承認する</text>
  <text x="211" y="438" text-anchor="middle" fill="#59677a" font-family="-apple-system,BlinkMacSystemFont,'Hiragino Sans','Noto Sans JP',sans-serif" font-size="21">結果を見る</text>

  <rect x="382" y="238" width="254" height="298" rx="22" fill="#eef5f9" stroke="#1b4565" stroke-width="3" filter="url(#shadow)"/>
  <text x="509" y="300" text-anchor="middle" fill="#1b4565" font-family="-apple-system,BlinkMacSystemFont,'Hiragino Sans','Noto Sans JP',sans-serif" font-size="32" font-weight="800">Host</text>
  <text x="509" y="360" text-anchor="middle" fill="#172033" font-family="-apple-system,BlinkMacSystemFont,'Hiragino Sans','Noto Sans JP',sans-serif" font-size="24" font-weight="700">modelを持つ</text>
  <text x="509" y="402" text-anchor="middle" fill="#59677a" font-family="-apple-system,BlinkMacSystemFont,'Hiragino Sans','Noto Sans JP',sans-serif" font-size="21">承認UI</text>
  <text x="509" y="438" text-anchor="middle" fill="#59677a" font-family="-apple-system,BlinkMacSystemFont,'Hiragino Sans','Noto Sans JP',sans-serif" font-size="21">接続設定</text>
  <text x="509" y="474" text-anchor="middle" fill="#59677a" font-family="-apple-system,BlinkMacSystemFont,'Hiragino Sans','Noto Sans JP',sans-serif" font-size="21">audit log</text>

  <rect x="692" y="238" width="254" height="298" rx="22" fill="#f1faf8" stroke="#2f9c95" stroke-width="3" filter="url(#shadow)"/>
  <text x="819" y="292" text-anchor="middle" fill="#1b4565" font-family="-apple-system,BlinkMacSystemFont,'Hiragino Sans','Noto Sans JP',sans-serif" font-size="30" font-weight="800">MCP Client</text>
  <text x="819" y="360" text-anchor="middle" fill="#172033" font-family="-apple-system,BlinkMacSystemFont,'Hiragino Sans','Noto Sans JP',sans-serif" font-size="24" font-weight="700">serverごとに</text>
  <text x="819" y="394" text-anchor="middle" fill="#172033" font-family="-apple-system,BlinkMacSystemFont,'Hiragino Sans','Noto Sans JP',sans-serif" font-size="24" font-weight="700">sessionを持つ</text>
  <text x="819" y="452" text-anchor="middle" fill="#59677a" font-family="-apple-system,BlinkMacSystemFont,'Hiragino Sans','Noto Sans JP',sans-serif" font-size="21">JSON-RPC</text>
  <text x="819" y="488" text-anchor="middle" fill="#59677a" font-family="-apple-system,BlinkMacSystemFont,'Hiragino Sans','Noto Sans JP',sans-serif" font-size="21">capability negotiation</text>

  <rect x="1002" y="238" width="254" height="298" rx="22" fill="#fff8eb" stroke="#c98220" stroke-width="3" filter="url(#shadow)"/>
  <text x="1129" y="292" text-anchor="middle" fill="#1b4565" font-family="-apple-system,BlinkMacSystemFont,'Hiragino Sans','Noto Sans JP',sans-serif" font-size="30" font-weight="800">MCP Server</text>
  <text x="1129" y="360" text-anchor="middle" fill="#172033" font-family="-apple-system,BlinkMacSystemFont,'Hiragino Sans','Noto Sans JP',sans-serif" font-size="24" font-weight="700">機能を宣言する</text>
  <text x="1129" y="414" text-anchor="middle" fill="#59677a" font-family="-apple-system,BlinkMacSystemFont,'Hiragino Sans','Noto Sans JP',sans-serif" font-size="21">tools</text>
  <text x="1129" y="450" text-anchor="middle" fill="#59677a" font-family="-apple-system,BlinkMacSystemFont,'Hiragino Sans','Noto Sans JP',sans-serif" font-size="21">resources</text>
  <text x="1129" y="486" text-anchor="middle" fill="#59677a" font-family="-apple-system,BlinkMacSystemFont,'Hiragino Sans','Noto Sans JP',sans-serif" font-size="21">prompts</text>

  <rect x="1308" y="238" width="130" height="298" rx="22" fill="#f7f2ed" stroke="#d8c8b8" stroke-width="2" filter="url(#shadow)"/>
  <text x="1373" y="306" text-anchor="middle" fill="#1b4565" font-family="-apple-system,BlinkMacSystemFont,'Hiragino Sans','Noto Sans JP',sans-serif" font-size="28" font-weight="800">Backend</text>
  <text x="1373" y="374" text-anchor="middle" fill="#59677a" font-family="-apple-system,BlinkMacSystemFont,'Hiragino Sans','Noto Sans JP',sans-serif" font-size="20">API</text>
  <text x="1373" y="410" text-anchor="middle" fill="#59677a" font-family="-apple-system,BlinkMacSystemFont,'Hiragino Sans','Noto Sans JP',sans-serif" font-size="20">DB</text>
  <text x="1373" y="446" text-anchor="middle" fill="#59677a" font-family="-apple-system,BlinkMacSystemFont,'Hiragino Sans','Noto Sans JP',sans-serif" font-size="20">SaaS</text>

  <path d="M 334 388 L 370 388" fill="none" stroke="#1b4565" stroke-width="5" marker-end="url(#arrow)"/>
  <path d="M 644 388 L 680 388" fill="none" stroke="#1b4565" stroke-width="5" marker-end="url(#arrow)"/>
  <path d="M 954 388 L 990 388" fill="none" stroke="#1b4565" stroke-width="5" marker-end="url(#arrow)"/>
  <path d="M 1264 388 L 1296 388" fill="none" stroke="#1b4565" stroke-width="5" marker-end="url(#arrow)"/>

  <rect x="124" y="612" width="1288" height="86" rx="20" fill="#172033"/>
  <text x="768" y="648" text-anchor="middle" fill="#ffffff" font-family="-apple-system,BlinkMacSystemFont,'Hiragino Sans','Noto Sans JP',sans-serif" font-size="27" font-weight="800">MCP Serverはbackendそのものではない</text>
  <text x="768" y="686" text-anchor="middle" fill="#cbd6e2" font-family="-apple-system,BlinkMacSystemFont,'Hiragino Sans','Noto Sans JP',sans-serif" font-size="23">agent向けadapterとして、既存APIやDBを安全に公開する</text>
</svg>
