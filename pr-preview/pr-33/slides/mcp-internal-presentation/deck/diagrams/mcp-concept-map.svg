<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="440" viewBox="0 0 1100 440" role="img" aria-labelledby="title desc">
  <title id="title">MCP concept map</title>
  <desc id="desc">Concept map from user to host, MCP client, MCP server, backend, and surrounding workflow, transport, schema, and governance pieces.</desc>
  <defs>
    <style>
      .bg{fill:#fff}
      .lane{fill:#f6f8fb;stroke:#d9e2ec;stroke-width:2}
      .node{fill:#fff;stroke:#d9e2ec;stroke-width:2}
      .primary{fill:#eef8f7;stroke:#2f9c95;stroke-width:3}
      .accent{fill:#fff7ea;stroke:#c98220;stroke-width:2}
      .title{font:700 25px Inter,Arial,sans-serif;fill:#172033}
      .sub{font:500 17px Inter,Arial,sans-serif;fill:#5f6b7a}
      .label{font:800 17px Inter,Arial,sans-serif;fill:#1b4565;letter-spacing:.5px}
      .arrow{stroke:#1b4565;stroke-width:3;fill:none;marker-end:url(#arrow)}
      .soft{stroke:#8ca1b6;stroke-width:2;fill:none;stroke-dasharray:7 7}
    </style>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M2,2 L10,6 L2,10 Z" fill="#1b4565"/>
    </marker>
  </defs>
  <rect class="bg" width="1100" height="440"/>
  <rect class="lane" x="34" y="78" width="1032" height="165" rx="18"/>
  <text class="label" x="55" y="55">Main flow</text>

  <rect class="node" x="60" y="120" width="150" height="82" rx="12"/>
  <text class="title" x="135" y="153" text-anchor="middle">User</text>
  <text class="sub" x="135" y="180" text-anchor="middle">依頼・承認</text>

  <rect class="primary" x="278" y="110" width="178" height="102" rx="12"/>
  <text class="title" x="367" y="148" text-anchor="middle">Host</text>
  <text class="sub" x="367" y="175" text-anchor="middle">Claude / Codex / IDE</text>
  <text class="sub" x="367" y="199" text-anchor="middle">model・接続・承認</text>

  <rect class="node" x="524" y="110" width="178" height="102" rx="12"/>
  <text class="title" x="613" y="148" text-anchor="middle">MCP Client</text>
  <text class="sub" x="613" y="175" text-anchor="middle">session</text>
  <text class="sub" x="613" y="199" text-anchor="middle">JSON-RPC通信</text>

  <rect class="primary" x="770" y="110" width="178" height="102" rx="12"/>
  <text class="title" x="859" y="148" text-anchor="middle">MCP Server</text>
  <text class="sub" x="859" y="175" text-anchor="middle">tool / resource</text>
  <text class="sub" x="859" y="199" text-anchor="middle">promptを宣言</text>

  <rect class="node" x="926" y="285" width="142" height="82" rx="12"/>
  <text class="title" x="997" y="318" text-anchor="middle">Backend</text>
  <text class="sub" x="997" y="345" text-anchor="middle">SaaS / API / DB</text>

  <path class="arrow" d="M210 161 H268"/>
  <path class="arrow" d="M456 161 H514"/>
  <path class="arrow" d="M702 161 H760"/>
  <path class="arrow" d="M895 214 C928 242 958 263 984 279"/>

  <rect class="accent" x="164" y="292" width="178" height="82" rx="12"/>
  <text class="title" x="253" y="322" text-anchor="middle">Workflow</text>
  <text class="sub" x="253" y="349" text-anchor="middle">Skill / approval</text>

  <rect class="accent" x="400" y="292" width="178" height="82" rx="12"/>
  <text class="title" x="489" y="322" text-anchor="middle">Transport</text>
  <text class="sub" x="489" y="349" text-anchor="middle">stdio / HTTP</text>

  <rect class="accent" x="636" y="292" width="178" height="82" rx="12"/>
  <text class="title" x="725" y="322" text-anchor="middle">Schema</text>
  <text class="sub" x="725" y="349" text-anchor="middle">description / I/O</text>

  <rect class="accent" x="516" y="20" width="224" height="64" rx="12"/>
  <text class="title" x="628" y="48" text-anchor="middle">Governance</text>
  <text class="sub" x="628" y="70" text-anchor="middle">auth / scope / quota / audit</text>

  <path class="soft" d="M278 292 C303 250 333 233 367 212"/>
  <path class="soft" d="M500 292 C526 253 566 232 603 213"/>
  <path class="soft" d="M733 292 C769 253 813 234 850 212"/>
  <path class="soft" d="M628 84 C641 103 698 114 770 132"/>
</svg>
