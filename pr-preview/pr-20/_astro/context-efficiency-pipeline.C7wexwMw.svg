<svg xmlns="http://www.w3.org/2000/svg" width="1536" height="700" viewBox="0 100 1536 700" role="img" aria-labelledby="title desc">
<title id="title">Context efficient MCP design</title><desc id="desc">Context-efficient MCP design uses search, bounded detail, and summaries instead of dumping raw logs or documents.</desc>
<defs><marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto"><path d="M2 2 L10 6 L2 10 Z" fill="#1b4565"/></marker><style>text{font-family:-apple-system,BlinkMacSystemFont,'Noto Sans JP','Hiragino Sans',sans-serif;fill:#172033}.title{font-size:39px;font-weight:800}.sub{font-size:23px;fill:#546277}.h{font-size:27px;font-weight:800}.p{font-size:22px;fill:#42526a}.small{font-size:19px;fill:#546277}.mono{font-family:'SFMono-Regular','Menlo',monospace;font-size:20px;fill:#172033}.card{fill:#fff;stroke:#d5dde8;stroke-width:2}.blue{fill:#eef4fb;stroke:#1b4565}.teal{fill:#eaf5f4;stroke:#2f9c95}.amber{fill:#fff4df;stroke:#c98220}.gray{fill:#f6f8fb;stroke:#cbd5e1}.dark{fill:#172033}.white{fill:#fff}.label{font-size:18px;font-weight:800}.num{font-size:20px;font-weight:800;fill:#fff}</style></defs>

<rect class="card amber" x="86" y="190" width="426" height="165" rx="16"/><text class="h" x="126" y="244">避けたい設計</text><text class="mono" x="126" y="292">call_api(method, path, body)</text><text class="p" x="126" y="330">raw JSON / raw logを全部返す</text>
<rect class="card blue" x="88" y="480" width="330" height="170" rx="16"/><circle cx="126" cy="523" r="22" fill="#1b4565"/><text class="num" x="120" y="532">1</text><text class="h" x="166" y="532">search</text><text class="mono" x="126" y="586">search_incidents()</text><text class="p" x="126" y="624">summary + stable ID</text>
<rect class="card teal" x="594" y="480" width="330" height="170" rx="16"/><circle cx="632" cy="523" r="22" fill="#2f9c95"/><text class="num" x="626" y="532">2</text><text class="h" x="672" y="532">read detail</text><text class="mono" x="632" y="586">get_incident_detail()</text><text class="p" x="632" y="624">fields / max rowsで制限</text>
<rect class="card blue" x="1100" y="480" width="330" height="170" rx="16"/><circle cx="1138" cy="523" r="22" fill="#1b4565"/><text class="num" x="1132" y="532">3</text><text class="h" x="1178" y="532">summarize</text><text class="mono" x="1138" y="586">summarize_incident()</text><text class="p" x="1138" y="624">次の判断に使う形</text>
<path d="M428 565 H578" stroke="#1b4565" stroke-width="4" marker-end="url(#arrow)"/><path d="M934 565 H1084" stroke="#1b4565" stroke-width="4" marker-end="url(#arrow)"/>
<rect class="gray" x="650" y="205" width="696" height="110" rx="16"/><text class="h" x="690" y="252">Context budget</text><rect x="690" y="278" width="560" height="18" rx="9" fill="#dbe4ee"/><rect x="690" y="278" width="146" height="18" rx="9" fill="#2f9c95"/><text class="small" x="1264" y="298">少なく保つ</text>
</svg>
