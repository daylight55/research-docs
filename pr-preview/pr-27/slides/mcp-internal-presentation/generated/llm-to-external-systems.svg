<svg xmlns="http://www.w3.org/2000/svg" width="1536" height="700" viewBox="0 100 1536 700" role="img" aria-labelledby="title desc">
  <title id="title">LLMが外部systemへ出る入口</title>
  <desc id="desc">Hostの境界内にあるLLMが、MCP connection contractを通じて外部systemへ接続することを示すスライド用概念図。</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="10" markerHeight="10" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#1b4565"/>
    </marker>
    <filter id="shadow" x="-8%" y="-12%" width="116%" height="124%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#172033" flood-opacity="0.12"/>
    </filter>
  </defs>

  <rect x="96" y="222" width="440" height="446" rx="24" fill="#eef5f9" stroke="#b6c7d7" stroke-width="2" filter="url(#shadow)"/>
  <text x="128" y="280" fill="#1b4565" font-family="-apple-system,BlinkMacSystemFont,'Hiragino Sans','Noto Sans JP',sans-serif" font-size="30" font-weight="800">Host app boundary</text>
  <text x="128" y="320" fill="#59677a" font-family="-apple-system,BlinkMacSystemFont,'Hiragino Sans','Noto Sans JP',sans-serif" font-size="22">承認・scope・auditを持つ場所</text>
  <rect x="158" y="378" width="316" height="168" rx="24" fill="#172033"/>
  <text x="316" y="456" text-anchor="middle" fill="#ffffff" font-family="-apple-system,BlinkMacSystemFont,'Hiragino Sans','Noto Sans JP',sans-serif" font-size="40" font-weight="800">LLM</text>
  <text x="316" y="500" text-anchor="middle" fill="#cbd6e2" font-family="-apple-system,BlinkMacSystemFont,'Hiragino Sans','Noto Sans JP',sans-serif" font-size="23">依頼とcontextを読む</text>

  <path d="M 552 446 C 620 446, 642 446, 704 446" fill="none" stroke="#1b4565" stroke-width="8" marker-end="url(#arrow)"/>
  <rect x="706" y="246" width="356" height="400" rx="26" fill="#f1faf8" stroke="#2f9c95" stroke-width="3" filter="url(#shadow)"/>
  <text x="884" y="304" text-anchor="middle" fill="#1b4565" font-family="-apple-system,BlinkMacSystemFont,'Hiragino Sans','Noto Sans JP',sans-serif" font-size="30" font-weight="800">MCP</text>
  <text x="884" y="342" text-anchor="middle" fill="#172033" font-family="-apple-system,BlinkMacSystemFont,'Hiragino Sans','Noto Sans JP',sans-serif" font-size="25" font-weight="700">connection contract</text>
  <line x1="760" y1="382" x2="1008" y2="382" stroke="#b8dad5" stroke-width="2"/>
  <text x="758" y="432" fill="#172033" font-family="-apple-system,BlinkMacSystemFont,'Hiragino Sans','Noto Sans JP',sans-serif" font-size="25" font-weight="700">tools</text>
  <text x="866" y="432" fill="#172033" font-family="-apple-system,BlinkMacSystemFont,'Hiragino Sans','Noto Sans JP',sans-serif" font-size="25" font-weight="700">resources</text>
  <text x="758" y="486" fill="#172033" font-family="-apple-system,BlinkMacSystemFont,'Hiragino Sans','Noto Sans JP',sans-serif" font-size="25" font-weight="700">prompts</text>
  <text x="866" y="486" fill="#172033" font-family="-apple-system,BlinkMacSystemFont,'Hiragino Sans','Noto Sans JP',sans-serif" font-size="25" font-weight="700">schemas</text>
  <text x="884" y="560" text-anchor="middle" fill="#59677a" font-family="-apple-system,BlinkMacSystemFont,'Hiragino Sans','Noto Sans JP',sans-serif" font-size="23">何を読めるか</text>
  <text x="884" y="594" text-anchor="middle" fill="#59677a" font-family="-apple-system,BlinkMacSystemFont,'Hiragino Sans','Noto Sans JP',sans-serif" font-size="23">何を実行できるか</text>

  <path d="M 1078 446 C 1142 446, 1162 446, 1218 446" fill="none" stroke="#1b4565" stroke-width="8" marker-end="url(#arrow)"/>
  <rect x="1220" y="224" width="208" height="112" rx="22" fill="#fff8eb" stroke="#e1b16b" stroke-width="2"/>
  <text x="1324" y="292" text-anchor="middle" fill="#172033" font-family="-apple-system,BlinkMacSystemFont,'Hiragino Sans','Noto Sans JP',sans-serif" font-size="28" font-weight="800">GitHub</text>
  <rect x="1220" y="374" width="208" height="112" rx="22" fill="#fff8eb" stroke="#e1b16b" stroke-width="2"/>
  <text x="1324" y="442" text-anchor="middle" fill="#172033" font-family="-apple-system,BlinkMacSystemFont,'Hiragino Sans','Noto Sans JP',sans-serif" font-size="28" font-weight="800">DB / API</text>
  <rect x="1220" y="524" width="208" height="112" rx="22" fill="#fff8eb" stroke="#e1b16b" stroke-width="2"/>
  <text x="1324" y="592" text-anchor="middle" fill="#172033" font-family="-apple-system,BlinkMacSystemFont,'Hiragino Sans','Noto Sans JP',sans-serif" font-size="28" font-weight="800">Docs</text>
</svg>
