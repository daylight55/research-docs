<svg xmlns="http://www.w3.org/2000/svg" width="1536" height="700" viewBox="0 100 1536 700" role="img" aria-labelledby="title desc">
<title id="title">AWS AgentCore Remote MCP architecture</title><desc id="desc">AWS AgentCore Gateway as a remote MCP endpoint in front of OpenAPI, Lambda, existing MCP, and AWS service targets, with Identity managing token exchange.</desc>
