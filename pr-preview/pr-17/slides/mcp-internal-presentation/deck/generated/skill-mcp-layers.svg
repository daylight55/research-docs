<svg xmlns="http://www.w3.org/2000/svg" width="1536" height="864" viewBox="0 0 1536 864" role="img" aria-labelledby="title desc">
  <title id="title">SkillsとMCPの違い</title>
  <desc id="desc">Agent Skillはhow to proceed、MCPはwhat to access or executeであることを示すスライド用比較図。</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="10" markerHeight="10" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#1b4565"/>
    </marker>
    <filter id="shadow" x="-8%" y="-12%" width="116%" height="124%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#172033" flood-opacity="0.12"/>
    </filter>
  </defs>
  <rect width="1536" height="864" fill="#f6f8fb"/>
  <rect x="58" y="52" width="1420" height="760" rx="28" fill="#ffffff" stroke="#d8e0e8" stroke-width="2"/>
  <text x="92" y="124" fill="#172033" font-family="-apple-system,BlinkMacSystemFont,'Hiragino Sans','Noto Sans JP',sans-serif" font-size="44" font-weight="800">SkillsとMCPの違い</text>
  <text x="92" y="166" fill="#59677a" font-family="-apple-system,BlinkMacSystemFont,'Hiragino Sans','Noto Sans JP',sans-serif" font-size="24">Skillは進め方を固定し、MCPは外部data/actionへの入口を渡す</text>

  <rect x="118" y="232" width="560" height="318" rx="28" fill="#eef5f9" stroke="#1b4565" stroke-width="3" filter="url(#shadow)"/>
  <text x="158" y="302" fill="#1b4565" font-family="-apple-system,BlinkMacSystemFont,'Hiragino Sans','Noto Sans JP',sans-serif" font-size="34" font-weight="800">Agent Skill</text>
  <text x="158" y="354" fill="#172033" font-family="-apple-system,BlinkMacSystemFont,'Hiragino Sans','Noto Sans JP',sans-serif" font-size="30" font-weight="800">how to proceed</text>
  <line x1="158" y1="388" x2="638" y2="388" stroke="#c3d0dc" stroke-width="2"/>
  <text x="158" y="438" fill="#172033" font-family="-apple-system,BlinkMacSystemFont,'Hiragino Sans','Noto Sans JP',sans-serif" font-size="25" font-weight="700">workflow</text>
  <text x="158" y="484" fill="#172033" font-family="-apple-system,BlinkMacSystemFont,'Hiragino Sans','Noto Sans JP',sans-serif" font-size="25" font-weight="700">判断基準</text>
  <text x="382" y="438" fill="#172033" font-family="-apple-system,BlinkMacSystemFont,'Hiragino Sans','Noto Sans JP',sans-serif" font-size="25" font-weight="700">検証手順</text>
  <text x="382" y="484" fill="#172033" font-family="-apple-system,BlinkMacSystemFont,'Hiragino Sans','Noto Sans JP',sans-serif" font-size="25" font-weight="700">出力形式</text>

  <rect x="858" y="232" width="560" height="318" rx="28" fill="#f1faf8" stroke="#2f9c95" stroke-width="3" filter="url(#shadow)"/>
  <text x="898" y="302" fill="#1b4565" font-family="-apple-system,BlinkMacSystemFont,'Hiragino Sans','Noto Sans JP',sans-serif" font-size="34" font-weight="800">MCP Server</text>
  <text x="898" y="354" fill="#172033" font-family="-apple-system,BlinkMacSystemFont,'Hiragino Sans','Noto Sans JP',sans-serif" font-size="30" font-weight="800">what to access / execute</text>
  <line x1="898" y1="388" x2="1378" y2="388" stroke="#b8dad5" stroke-width="2"/>
  <text x="898" y="438" fill="#172033" font-family="-apple-system,BlinkMacSystemFont,'Hiragino Sans','Noto Sans JP',sans-serif" font-size="25" font-weight="700">data</text>
  <text x="898" y="484" fill="#172033" font-family="-apple-system,BlinkMacSystemFont,'Hiragino Sans','Noto Sans JP',sans-serif" font-size="25" font-weight="700">action</text>
  <text x="1118" y="438" fill="#172033" font-family="-apple-system,BlinkMacSystemFont,'Hiragino Sans','Noto Sans JP',sans-serif" font-size="25" font-weight="700">SaaS / DB</text>
  <text x="1118" y="484" fill="#172033" font-family="-apple-system,BlinkMacSystemFont,'Hiragino Sans','Noto Sans JP',sans-serif" font-size="25" font-weight="700">社内API</text>

  <path d="M 700 392 C 740 354, 800 354, 840 392" fill="none" stroke="#1b4565" stroke-width="5" marker-end="url(#arrow)"/>
  <text x="768" y="338" text-anchor="middle" fill="#59677a" font-family="-apple-system,BlinkMacSystemFont,'Hiragino Sans','Noto Sans JP',sans-serif" font-size="22">agentが両方を使う</text>

  <rect x="144" y="620" width="1248" height="90" rx="22" fill="#172033"/>
  <text x="768" y="658" text-anchor="middle" fill="#ffffff" font-family="-apple-system,BlinkMacSystemFont,'Hiragino Sans','Noto Sans JP',sans-serif" font-size="30" font-weight="800">結論: Skill = how to proceed / MCP = what to access or execute</text>
  <text x="768" y="696" text-anchor="middle" fill="#cbd6e2" font-family="-apple-system,BlinkMacSystemFont,'Hiragino Sans','Noto Sans JP',sans-serif" font-size="23">Skillは手順、MCPは接続先。競合ではなく役割が違う。</text>
</svg>
