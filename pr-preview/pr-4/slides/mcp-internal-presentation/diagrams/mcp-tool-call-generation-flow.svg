<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 520" role="img" aria-labelledby="title desc">
  <title id="title">MCP tool call generation flow</title>
  <desc id="desc">MCP server lists tools, host maps them to provider tool schema, LLM emits a tool call, and host converts it to MCP tools/call JSON-RPC.</desc>
  <defs>
    <style>
      .bg { fill: #fbfcfe; }
      .lane { fill: #f8fafc; stroke: #7aa2c7; stroke-width: 2; rx: 14; }
      .host { fill: #eef6ff; stroke: #356b9a; }
      .server { fill: #eff7f1; stroke: #467a56; }
      .model { fill: #fff7e6; stroke: #a26a22; }
      .title { fill: #17202a; font: 700 24px Inter, Arial, sans-serif; }
      .label { fill: #17202a; font: 600 18px Inter, Arial, sans-serif; }
      .small { fill: #475569; font: 14px Inter, Arial, sans-serif; }
      .arrow { stroke: #64748b; stroke-width: 3; fill: none; marker-end: url(#arrow); }
      .return { stroke: #64748b; stroke-width: 3; fill: none; stroke-dasharray: 8 8; marker-end: url(#arrow); }
      .note { fill: #ffffff; stroke: #cbd5e1; stroke-width: 1.5; rx: 10; }
      .num { fill: #356b9a; font: 700 15px Inter, Arial, sans-serif; }
    </style>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M2,2 L10,6 L2,10 Z" fill="#64748b" />
    </marker>
  </defs>

  <rect class="bg" x="0" y="0" width="1280" height="520" />
  <text class="title" x="52" y="48">LLM does not call MCP directly</text>
  <text class="small" x="52" y="75">The host translates between provider tool calls and MCP JSON-RPC.</text>

  <rect class="lane server" x="58" y="112" width="300" height="290" />
  <text class="label" x="92" y="154">MCP Server</text>
  <text class="small" x="92" y="181">Owns the tool catalog</text>
  <text class="small" x="92" y="203">and executes backend APIs.</text>

  <rect class="lane host" x="490" y="112" width="300" height="290" />
  <text class="label" x="524" y="154">Host / MCP Client</text>
  <text class="small" x="524" y="181">Maps tool metadata to</text>
  <text class="small" x="524" y="203">provider-specific schema.</text>

  <rect class="lane model" x="922" y="112" width="300" height="290" />
  <text class="label" x="956" y="154">LLM</text>
  <text class="small" x="956" y="181">Chooses tool name and</text>
  <text class="small" x="956" y="203">generates arguments.</text>

  <path class="arrow" d="M358 238 C418 238 430 238 490 238" />
  <rect class="note" x="366" y="202" width="118" height="72" />
  <text class="num" x="382" y="224">1</text>
  <text class="small" x="404" y="224">tools/list</text>
  <text class="small" x="382" y="248">name, desc,</text>
  <text class="small" x="382" y="268">schema</text>

  <path class="arrow" d="M790 238 C850 238 862 238 922 238" />
  <rect class="note" x="798" y="202" width="118" height="72" />
  <text class="num" x="814" y="224">2</text>
  <text class="small" x="836" y="224">tool schema</text>
  <text class="small" x="814" y="248">in model</text>
  <text class="small" x="814" y="268">context</text>

  <path class="return" d="M922 315 C862 315 850 315 790 315" />
  <rect class="note" x="798" y="300" width="118" height="72" />
  <text class="num" x="814" y="322">3</text>
  <text class="small" x="836" y="322">tool call</text>
  <text class="small" x="814" y="346">name +</text>
  <text class="small" x="814" y="366">arguments</text>

  <path class="arrow" d="M490 315 C430 315 418 315 358 315" />
  <rect class="note" x="366" y="300" width="118" height="72" />
  <text class="num" x="382" y="322">4</text>
  <text class="small" x="404" y="322">tools/call</text>
  <text class="small" x="382" y="346">JSON-RPC</text>

  <path class="return" d="M358 372 C560 464 722 464 922 372" />
  <text class="small" x="505" y="452">5. tool result returns to the host, then back into model context</text>
</svg>
